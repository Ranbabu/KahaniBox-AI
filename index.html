<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>News Studio Pro - V2 Advanced</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">

<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>
:root { 
    --primary: #0ea5e9; 
    --bg: #0f172a; 
    --card-bg: #1e293b; 
    --text: #f1f5f9; 
    --text-muted: #94a3b8;
    --border: #334155; 
    --header-h: 60px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { 
    margin: 0; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column;
}

header {
    height: var(--header-h);
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    position: fixed;
    top: 0; width: 100%; z-index: 100;
}
.header-title { display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--primary); }
.header-right { display: flex; gap: 10px; }

.btn-icon { background: none; border: none; color: var(--text); cursor: pointer; padding: 5px; display: flex; align-items: center; }

/* Sidebar Styles */
.sidebar {
    position: fixed; top: var(--header-h); right: -320px; width: 320px; height: calc(100vh - var(--header-h));
    background: var(--card-bg); border-left: 1px solid var(--border); transition: right 0.3s ease;
    z-index: 95; padding: 20px; overflow-y: auto; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
}
.sidebar.active { right: 0; }
.sidebar h3 { margin-top: 0; color: var(--primary); font-size: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
.sidebar input, .sidebar select { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: #fff; }

/* Main Content */
.main-content { margin-top: var(--header-h); padding: 15px; max-width: 900px; margin-left: auto; margin-right: auto; width: 100%; padding-bottom: 100px; }

.video-studio-panel {
    background: #111827; border: 1px solid #374151; border-radius: 16px;
    padding: 15px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.video-preview-container {
    width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; border: 2px solid var(--border);
    overflow: hidden; position: relative; margin-bottom: 15px;
}
#liveCanvas { width: 100%; height: 100%; object-fit: contain; }

/* Action Buttons - Compact Look */
.btn-row { display: flex; gap: 10px; justify-content: center; }
.btn-sm { 
    padding: 8px 16px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; 
    display: flex; align-items: center; gap: 6px; font-size: 0.9rem; transition: 0.2s;
}
.btn-preview { background: #3b82f6; color: white; }
.btn-download { background: #10b981; color: white; }
.btn-reset { background: #ef4444; color: white; font-size: 0.8rem; padding: 5px 12px; }

/* Segment Cards */
.segment-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 15px; margin-bottom: 20px; position: relative;
}
.image-gallery { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; min-height: 80px; }
.img-container { position: relative; flex-shrink: 0; }
.img-container img { height: 70px; width: 100px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); }
.img-del { 
    position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; 
    border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; 
    justify-content: center; font-size: 12px; cursor: pointer; border: 2px solid var(--card-bg);
}

textarea {
    width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); 
    background: #0f172a; color: #fff; margin-top: 10px; resize: vertical; min-height: 80px;
}

.input-file-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
.input-file-grid label { font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 4px; }

.recording-indicator {
    position: absolute; top: 10px; left: 10px; background: rgba(239,68,68,0.9);
    color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold;
    display: none; animation: blink 1s infinite;
}
@keyframes blink { 50% { opacity: 0.3; } }

.fab-add {
    position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white;
    border: none; width: 56px; height: 56px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

<header>
    <div class="header-title">
        <span class="material-icons-round" style="color:#fbbf24;">live_tv</span>
        <span>News Studio Pro</span>
    </div>
    <div class="header-right">
        <button class="btn-sm btn-reset" onclick="fullReset()">Reset All Data</button>
        <button class="btn-icon" onclick="toggleSidebar()"><span class="material-icons-round">settings</span></button>
    </div>
</header>

<div class="sidebar" id="apiSidebar">
    <h3>API & System Settings</h3>
    <label>AI Provider</label>
    <select id="aiProviderSelect">
        <option value="groq">Groq AI (Fast)</option>
        <option value="mistral">Mistral AI</option>
    </select>
    <input type="password" id="groqApiKey" placeholder="Groq API Key">
    <input type="password" id="mistralApiKey" placeholder="Mistral API Key">
    
    <label>Image Search (Ranimage)</label>
    <input type="text" id="ranApiUrl" value="https://ranimage.onrender.com/api/search">
    
    <button class="btn-sm btn-download" style="width:100%" onclick="saveSettings()">Save Settings</button>
</div>

<div class="main-content">

    <div class="video-studio-panel">
        <div class="video-preview-container">
            <canvas id="liveCanvas" width="1280" height="720"></canvas>
            <div class="recording-indicator" id="recIndicator">● RECORDING</div>
        </div>

        <div class="btn-row">
            <button class="btn-sm btn-preview" id="btnPreview" onclick="handlePreviewClick()">
                <span class="material-icons-round" id="prevIcon">play_arrow</span> <span id="prevText">Preview Video</span>
            </button>
            <button class="btn-sm btn-download" id="btnDownload" onclick="runVideoSequence(true)">
                <span class="material-icons-round">download</span> Download
            </button>
        </div>
    </div>

    <!-- Quick Paste Area -->
    <div class="video-studio-panel" style="background:#1e293b;">
        <label style="font-size:0.9rem; font-weight:600;">Quick Script Paste (Auto-Split)</label>
        <textarea id="quickPasteScript" placeholder="1. Noida News... 2. Delhi News..." style="min-height:60px;"></textarea>
        <button class="btn-sm btn-download" style="margin-top:10px; width:100%;" onclick="createSegmentsFromPaste()">
            <span class="material-icons-round">bolt</span> Auto Create Segments
        </button>
    </div>

    <div id="segments-list"></div>

</div>

<button class="fab-add" onclick="addNewSegment()"><span class="material-icons-round">add</span></button>

<script>
    let segmentsData = [];
    let isPlaying = false;
    let isRecording = false;
    let currentAudio = null;
    let animationId = null;
    let audioCtx = null;
    
    window.onload = () => {
        loadSettings();
        loadStoredSegments();
    }

    function toggleSidebar() { document.getElementById('apiSidebar').classList.toggle('active'); }

    function saveSettings() {
        localStorage.setItem('groqApiKey', document.getElementById('groqApiKey').value);
        localStorage.setItem('mistralApiKey', document.getElementById('mistralApiKey').value);
        localStorage.setItem('aiProvider', document.getElementById('aiProviderSelect').value);
        localStorage.setItem('ranApiUrl', document.getElementById('ranApiUrl').value);
        alert("Settings Saved!"); toggleSidebar();
    }

    function loadSettings() {
        document.getElementById('groqApiKey').value = localStorage.getItem('groqApiKey') || '';
        document.getElementById('mistralApiKey').value = localStorage.getItem('mistralApiKey') || '';
        document.getElementById('aiProviderSelect').value = localStorage.getItem('aiProvider') || 'groq';
        document.getElementById('ranApiUrl').value = localStorage.getItem('ranApiUrl') || 'https://ranimage.onrender.com/api/search';
    }

    function fullReset() {
        if(confirm("Are you sure? This will delete all news data.")){
            segmentsData = [];
            document.getElementById('segments-list').innerHTML = '';
            localStorage.removeItem('newsSegments');
            location.reload();
        }
    }

    function addNewSegment(text = "", headline = "", index = null) {
        const id = Date.now() + Math.random();
        const seg = {
            id: id,
            text: text,
            headline: headline || "ताज़ा खबर",
            index: index || (segmentsData.length + 1),
            images: [],
            videoUrl: null,
            audioUrl: null,
            voice: 'hi-male',
            duration: 0
        };
        segmentsData.push(seg);
        renderSegment(seg);
        saveSegmentsToLocal();
        return id;
    }

    function renderSegment(seg) {
        const div = document.createElement('div');
        div.className = 'segment-card';
        div.id = `seg-card-${seg.id}`;
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="font-weight:bold; color:var(--primary);">News #${seg.index}</span>
                <button class="btn-icon" onclick="removeSegment('${seg.id}')" style="color:#ef4444;"><span class="material-icons-round">delete</span></button>
            </div>
            
            <input type="text" value="${seg.headline}" onchange="updateSegData('${seg.id}', 'headline', this.value)" placeholder="Headline..." style="width:100%; padding:8px; background:#0f172a; border:1px solid #334155; color:white; border-radius:5px;">
            
            <div class="image-gallery" id="gallery-${seg.id}"></div>
            
            <div class="input-file-grid">
                <div>
                    <label>Add Image</label>
                    <input type="file" accept="image/*" onchange="uploadImage(this, '${seg.id}')">
                </div>
                <div>
                    <label>Add Video Clip</label>
                    <input type="file" accept="video/*" onchange="uploadVideo(this, '${seg.id}')">
                </div>
            </div>

            <textarea onchange="updateSegData('${seg.id}', 'text', this.value)" placeholder="Enter script here...">${seg.text}</textarea>
            
            <div style="display:flex; gap:10px; margin-top:10px;">
                <select onchange="updateSegData('${seg.id}', 'voice', this.value)" style="flex:1; padding:8px; border-radius:5px; background:#0f172a; color:white;">
                    <option value="hi-male">Male Voice</option>
                    <option value="hi-female">Female Voice</option>
                </select>
                <button class="btn-sm btn-preview" onclick="generateAudio('${seg.id}')">Gen Audio</button>
            </div>
            <div id="status-${seg.id}" style="font-size:0.7rem; color:#10b981; margin-top:5px;"></div>
        `;
        document.getElementById('segments-list').appendChild(div);
        refreshGallery(seg.id);
    }

    function updateSegData(id, key, val) {
        const seg = segmentsData.find(s => s.id == id);
        if(seg) { seg[key] = val; saveSegmentsToLocal(); }
    }

    function uploadImage(input, id) {
        if(input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const seg = segmentsData.find(s => s.id == id);
                seg.images.push(e.target.result);
                refreshGallery(id);
                saveSegmentsToLocal();
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function uploadVideo(input, id) {
        if(input.files && input.files[0]) {
            const seg = segmentsData.find(s => s.id == id);
            seg.videoUrl = URL.createObjectURL(input.files[0]);
            document.getElementById(`status-${id}`).innerText = "✅ Video Clip Attached";
            saveSegmentsToLocal();
        }
    }

    function refreshGallery(id) {
        const seg = segmentsData.find(s => s.id == id);
        const gallery = document.getElementById(`gallery-${id}`);
        gallery.innerHTML = '';
        seg.images.forEach((imgSrc, idx) => {
            const container = document.createElement('div');
            container.className = 'img-container';
            container.innerHTML = `
                <img src="${imgSrc}">
                <div class="img-del" onclick="deleteImg('${id}', ${idx})">×</div>
            `;
            gallery.appendChild(container);
        });
    }

    function deleteImg(id, idx) {
        const seg = segmentsData.find(s => s.id == id);
        seg.images.splice(idx, 1);
        refreshGallery(id);
        saveSegmentsToLocal();
    }

    function removeSegment(id) {
        segmentsData = segmentsData.filter(s => s.id != id);
        document.getElementById(`seg-card-${id}`).remove();
        saveSegmentsToLocal();
    }

    async function generateAudio(id) {
        const seg = segmentsData.find(s => s.id == id);
        const status = document.getElementById(`status-${id}`);
        status.innerText = "Generating...";
        
        try {
            const res = await fetch("https://hindi-tts-3gjy.onrender.com/tts", {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ text: seg.text, voice: seg.voice, rate: 0, pitch: 0 })
            });
            const blob = await res.blob();
            seg.audioUrl = URL.createObjectURL(blob);
            
            const tempAudio = new Audio(seg.audioUrl);
            tempAudio.onloadedmetadata = () => {
                seg.duration = tempAudio.duration;
                status.innerText = `✅ Audio Ready (${seg.duration.toFixed(1)}s)`;
                saveSegmentsToLocal();
            };
        } catch(e) { status.innerText = "❌ Error Generating"; }
    }

    function handlePreviewClick() {
        if(isPlaying) {
            stopPlayback();
        } else {
            runVideoSequence(false);
        }
    }

    function stopPlayback() {
        isPlaying = false;
        if(currentAudio) { currentAudio.pause(); currentAudio = null; }
        if(animationId) cancelAnimationFrame(animationId);
        document.getElementById('prevIcon').innerText = 'play_arrow';
        document.getElementById('prevText').innerText = 'Preview Video';
    }

    async function runVideoSequence(record = false) {
        if(segmentsData.length === 0) return alert("Please add segments first.");
        
        const canvas = document.getElementById('liveCanvas');
        const ctx = canvas.getContext('2d');
        isPlaying = true;
        isRecording = record;
        
        document.getElementById('prevIcon').innerText = 'stop';
        document.getElementById('prevText').innerText = 'Stop Preview';
        
        if(record) document.getElementById('recIndicator').style.display = 'block';

        let recorder, chunks = [];
        if(record) {
            const stream = canvas.captureStream(30);
            recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, {type: 'video/webm'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = 'news_video.webm'; a.click();
                document.getElementById('recIndicator').style.display = 'none';
            };
            recorder.start();
        }

        for(let seg of segmentsData) {
            if(!isPlaying) break;
            if(!seg.audioUrl) await generateAudio(seg.id);
            await playSegment(seg, ctx, canvas);
        }

        if(record && recorder) recorder.stop();
        stopPlayback();
    }

    function playSegment(seg, ctx, canvas) {
        return new Promise((resolve) => {
            const audio = new Audio(seg.audioUrl);
            currentAudio = audio;
            const startTime = performance.now();
            const duration = seg.duration * 1000;
            
            let videoElem = null;
            if(seg.videoUrl) {
                videoElem = document.createElement('video');
                videoElem.src = seg.videoUrl;
                videoElem.muted = true;
                videoElem.play();
            }

            const imgObjs = seg.images.map(src => {
                const i = new Image(); i.src = src; return i;
            });

            function draw(now) {
                if(!isPlaying) return resolve();
                const elapsed = now - startTime;
                
                // 1. Background (Video or Image)
                ctx.fillStyle = "black"; ctx.fillRect(0,0, canvas.width, canvas.height);
                if(videoElem) {
                    ctx.drawImage(videoElem, 0, 0, canvas.width, canvas.height);
                } else if(imgObjs.length > 0) {
                    const idx = Math.floor((elapsed / duration) * imgObjs.length) % imgObjs.length;
                    const img = imgObjs[idx];
                    if(img.complete) {
                        const scale = 1 + (elapsed/duration)*0.1;
                        ctx.save();
                        ctx.translate(canvas.width/2, canvas.height/2);
                        ctx.scale(scale, scale);
                        ctx.drawImage(img, -canvas.width/2, -canvas.height/2, canvas.width, canvas.height);
                        ctx.restore();
                    }
                }

                // --- NEW DESIGN OVERLAYS ---
                
                // 1. HEADLINE BAR (White - Bottom)
                const headH = 60;
                const bottomY = canvas.height - 60;
                ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
                ctx.fillRect(0, bottomY, canvas.width, headH);
                
                // Headline Text
                ctx.fillStyle = "black"; ctx.font = "bold 34px Arial";
                const hTxt = "► " + seg.headline;
                const hWidth = ctx.measureText(hTxt).width;
                let hX = canvas.width - ((elapsed * 0.15) % (canvas.width + hWidth));
                ctx.fillText(hTxt, hX, bottomY + 42);

                // 2. BREAKING NEWS BAR (Red - Above Headline with Gap)
                const breakH = 40;
                const breakY = bottomY - breakH - 15; // 15px Gap
                ctx.fillStyle = "#ef4444";
                ctx.fillRect(0, breakY, 320, breakH);
                ctx.fillStyle = "white"; ctx.font = "bold 24px Arial";
                ctx.textAlign = "center";
                ctx.fillText("BREAKING NEWS", 160, breakY + 28);
                ctx.textAlign = "left";

                // 3. NEWS NUMBER BOX (Yellow - Safe Zone above Breaking)
                const numBoxH = 50;
                const numBoxW = 70;
                const numY = breakY - numBoxH - 10;
                const numX = 30; // 30px from left (Safe Zone)
                ctx.fillStyle = "#fbbf24";
                ctx.fillRect(numX, numY, numBoxW, numBoxH);
                ctx.fillStyle = "black"; ctx.font = "bold 32px Arial";
                ctx.textAlign = "center";
                ctx.fillText(seg.index, numX + (numBoxW/2), numY + 36);
                ctx.textAlign = "left";

                if(elapsed < duration) {
                    animationId = requestAnimationFrame(draw);
                } else {
                    if(videoElem) videoElem.pause();
                    resolve();
                }
            }
            audio.play();
            animationId = requestAnimationFrame(draw);
        });
    }

    function createSegmentsFromPaste() {
        const text = document.getElementById('quickPasteScript').value;
        if(!text) return;
        const parts = text.split(/\d+[\.\)]/); // Split by 1. or 1)
        parts.forEach((p, i) => {
            if(p.trim().length > 5) {
                const lines = p.trim().split('\n');
                addNewSegment(p.trim(), lines[0].substring(0, 40));
            }
        });
        document.getElementById('quickPasteScript').value = '';
    }

    // Storage logic
    function saveSegmentsToLocal() {
        const dataToSave = segmentsData.map(s => ({
            text: s.text, headline: s.headline, index: s.index, voice: s.voice, images: s.images
        }));
        localStorage.setItem('newsSegments', JSON.stringify(dataToSave));
    }

    function loadStoredSegments() {
        const stored = localStorage.getItem('newsSegments');
        if(stored) {
            const parsed = JSON.parse(stored);
            parsed.forEach(s => {
                const id = addNewSegment(s.text, s.headline, s.index);
                const seg = segmentsData.find(sd => sd.id == id);
                seg.voice = s.voice;
                seg.images = s.images || [];
                refreshGallery(id);
            });
        }
    }
</script>

</body>
</html>
